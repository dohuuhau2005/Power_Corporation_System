# Cấu hình worker xử lý kết nối đồng thời
events {
    worker_connections 1024;
}

http {
    # ----------------------------------------------------
    # KHỐI UPSTREAM: CHIẾN THUẬT CHIA BÀI & FAILOVER
    # ----------------------------------------------------
    upstream dienluc_backend {
        # THUẬT TOÁN: Ưu tiên giao việc cho con server nào đang rảnh nhất
        least_conn; 

        # DANH SÁCH SERVER:
        # max_fails=3: Sập 3 lần là đánh dấu tử.
        # fail_timeout=15s: Cho ngồi dự bị 15s rồi mới cho thử lại.
        
        # 1. Máy nội bộ của sếp (Đổi thành IP LAN thật của sếp)
        server 192.168.1.10:9999 max_fails=3 fail_timeout=15s; 

        # 2. Máy ở xa của thằng bạn qua ZeroTier (Đổi thành IP ZeroTier thật)
        server 192.168.195.89:9999 max_fails=3 fail_timeout=15s;
        
        # 3. Server dự phòng (Con Át chủ bài)
        # Chữ 'backup' nghĩa là nó sẽ ngủ đông. CHỈ KHI NÀO 2 CON TRÊN SẬP HẾT NÓ MỚI CHẠY.
        # (Nếu sếp không có máy thứ 3 thì cứ xóa hoặc comment dòng này lại)
        # server 192.168.1.99:9999 backup; 
    }

    # ----------------------------------------------------
    # KHỐI SERVER: CỔNG ĐÓN KHÁCH BÊN NGOÀI
    # ----------------------------------------------------
    server {
        # Đón khách ở port 80 (chạy qua Docker sẽ tự map)
        listen 80;
        
        # Tên miền (nếu có), không có thì để dấu _
        server_name _; 

        location / {
            # Bắn toàn bộ request vào khối upstream ở trên
            proxy_pass http://dienluc_backend;
            
            # CÁC HEADER THẦN THÁNH: Giúp Node.js Backend biết IP thật của khách hàng
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Cấu hình Timeout: Bắt buộc phải có khi xài ZeroTier đề phòng mạng lag
            proxy_connect_timeout 5s;   # Chờ kết nối 5s, không được thì bỏ nghiệm chuyển máy khác
            proxy_send_timeout 10s;     # Chờ gửi data 10s
            proxy_read_timeout 10s;     # Chờ Backend tính toán trả kết quả 10s
        }
    }
}